run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    # Correctness
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - exhaustive
    - unconvert
    - nakedret
    # Security
    - gosec
    # Style / readability
    - revive
    - gocritic
    - misspell
    - godot
    - whitespace
    # Formatting
    - gofumpt
    # Performance
    - prealloc

linters-settings:
  staticcheck:
    # Enable all check suites: SA (bugs), S (simplifications), ST (style), QF (quickfixes).
    checks: ["all"]

  gofumpt:
    extra-rules: true

  exhaustive:
    # A default branch does not satisfy exhaustiveness; all enum values must be explicit.
    default-signifies-exhaustive: false

  nakedret:
    # Flag naked returns in functions longer than 5 lines.
    max-func-lines: 5

  gosec:
    excludes:
      # G115: integer overflow on conversion — false positive here because all channel
      # values are clamped to [0, 1] before multiplication, so the result is always
      # in [0, 255] and fits safely in uint8.
      - G115

  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: error-strings
      - name: if-return
      - name: increment-decrement
      - name: range
      - name: receiver-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else

  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      # hugeParam flags struct-by-value params; intentional in this library since
      # Color and HSL/HSV/LAB/LCH are small value types passed by value throughout.
      - hugeParam

  godot:
    # Only require periods on declaration-level doc comments (not inline const labels).
    scope: declarations

  misspell:
    locale: US

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    # Test files get a looser pass on style rules.
    - path: _test\.go
      linters:
        - gocritic
        - revive
        - gosec
